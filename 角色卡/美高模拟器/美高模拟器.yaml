  酒馆助手:
    脚本库:
      - 名称: 地图
        id: 1276d67b-8b61-456f-8eb5-8a83c6132b3e
        启用: true
        类型: 脚本
        内容:
          "\"\\\"use strict\\\";\\nconst lorebook_name = '美高模拟器';\\nconst map_tag =
          '<Map>';\\nconst map_regex =
          /<Map>([\\\\s\\\\S]+?)<\\\\/Map>/s;\\n\\n//--------------------------\
          ---------------------------------------------------------------------\
          -----------------------\\n// 地图格式说明:\\n// [MOVEBLOCK:YES/NO] -
          控制是否允许自由移动\\n// [主地点]子地点1@角色1,角色2|子地点2@角色3,角色4\\n// \\n// 格式详解:\\n//
          1. 主地点名称放在方括号中\\n// 2. 子地点之间使用竖线\\\"|\\\"分隔\\n// 3.
          子地点与该地点的NPC角色之间使用\\\"@\\\"符号分隔\\n// 4.
          多个角色之间使用逗号\\\",\\\"分隔\\n//-------------------------------------------\
          ---------------------------------------------------------------------\
          ------\\nvar option;\\n(function (option_1) {\\n    const
          default_option = {\\n        should_send_directly:
          true,\\n        init_delay: 0, // 默认初始化延迟为0毫秒\\n    };\\n    async
          function parse_option() {\\n        const transformers =
          {\\n            '开启则直接发送，关闭则填在输入框': (value) => ({
          should_send_directly: value }),\\n            '初始化延迟': (value,
          content) => ({ init_delay: content && !isNaN(Number(content)) ?
          Number(content) : 0 }),\\n        };\\n        return await
          getLorebookEntries(lorebook_name, { filter: { comment: '设置-' }
          })\\n            .then(entries => entries.map(entry => ({
          \\n                option: entry.comment.replace('设置-', ''),
          \\n                value: entry.enabled,\\n                content:
          entry.content\\n            })))\\n            .then(entries =>
          entries.reduce((result, { option, value, content }) =>
          ({\\n            ...result,\\n            ...transformers[option]?.(v\
          alue, content),\\n        }), default_option));\\n    }\\n    async
          function update() {\\n        const old_option =
          option_1.option;\\n        option_1.option = await
          parse_option();\\n        return !_.isEqual(option_1.option,
          old_option);\\n    }\\n    option_1.update = update;\\n})(option ||
          (option =
          {}));\\n//-----------------------------------------------------------\
          -----------------------------------------------------------\\nfunction
          parseMapData(text) {\\n    const lines =
          text.trim().split('\\\\n');\\n    let result = {\\n        moveBlock:
          false,\\n        locations: []\\n    };\\n    \\n    for (const line
          of lines) {\\n        if (line.trim() === '')
          continue;\\n        \\n        if (line.startsWith('[MOVEBLOCK:'))
          {\\n            result.moveBlock =
          line.includes('YES');\\n            continue;\\n        }\\n        \
          \\n        const mainLocationMatch =
          line.match(/\\\\[(.*?)\\\\](.*)/);\\n        if (mainLocationMatch)
          {\\n            const mainLocation =
          mainLocationMatch[1].trim();\\n            const subLocationsText =
          mainLocationMatch[2].trim();\\n            const subLocations =
          subLocationsText.split('|').map(item => {\\n                const
          subItem = item.trim();\\n                let subLocation =
          subItem;\\n                let characters =
          [];\\n                \\n                //
          使用@符号分隔子位置和角色信息，而不是空格\\n                // 格式:
          子位置名@角色1,角色2,角色3\\n                const characterMatch =
          subItem.match(/(.*?)@(.*)/);\\n                if (characterMatch)
          {\\n                    subLocation =
          characterMatch[1].trim();\\n                    const characterText =
          characterMatch[2].trim();\\n                    if (characterText)
          {\\n                        characters =
          characterText.split(',').map(c =>
          c.trim());\\n                    }\\n                }\\n                \
          \\n                return {\\n                    name:
          subLocation,\\n                    characters:
          characters\\n                };\\n            });\\n            \\n            \
          result.locations.push({\\n                name:
          mainLocation,\\n                subLocations:
