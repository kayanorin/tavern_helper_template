---
变量更新规则:
  巡礼:
    当前城市:
      check:
        - 到达新城市时更新
    当前大区:
      check:
        - 跟随当前城市所在大区同步更新
    品鉴记录:
      type: |-
        {
          [城市名: string]: {
            大区: string;
            评测摘要: string;
            城市分: number; // 0~10
          }
        }
      check:
        - "{{user}}完成一座城市品鉴并发表评测后 insert 新条目"
        - 大区须与世界地理概览中区域名一致
        - 评测摘要用一句话概括对这座城市之味的核心感受
        - 城市分仅评价本次食评质量(0~10)，综合考虑感知精确度、文字表现力和社会影响
        - 不得重复添加已存在的城市（城市名作key天然唯一）
        - 总评分由系统自动累加，绝不手动计算
    在场角色:
      type: "string[]"
      check:
        - NPC出现在当前叙事场景时 insert
        - NPC离开当前场景时 remove
        - 仅追踪与巡礼竞争相关的NPC，不包含路人或一次性角色
    退赛NPC:
      type: "string[]"
      check:
        - NPC明确宣布退出巡礼时 insert 其名字
        - 脚本会自动处理并清空此列表，无需手动remove
        - 仅在剧情明确提及退赛时操作
    专题品鉴:
      type: |-
        {
          [专题名: string]: {
            已完成: string[];
            目标数: number;
          }
        }
      check:
        - "{{user}}自选或被推荐开启专题品鉴时 insert 新专题"
        - 完成专题中的一项时将条目名 insert 到已完成列表
        - 目标数在专题创建时设定
    声望:
      type: number
      check:
        - 发表高质量评测 +2~5
        - 获得里程碑称号 +5~10
        - 卷入公众争议时可剧烈波动
        - 无上限，只增不减（严重负面事件除外）
