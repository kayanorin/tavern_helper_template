---
变量更新规则:
  当前味阶:
    check:
      - 验证禁忌搭配带来实质性味觉成长时更新
      - 使用"序列名·子等级"格式（如"辨味之心·中"）
      - 深渊路线的味觉成长与正统路线不同，偏向感知维度的展开
  深渊:
    验证记录:
      type: |-
        {
          [验证名: string]: {
            来源: string; // 从哪个黑市/谁那里获得
            类型: '食材' | '技法' | '搭配';
            结论: string; // 一句话验证结论
            GMA管制级别: 'C' | 'B' | 'A' | 'S';
          }
        }
      check:
        - "{{user}}亲手验证一种被禁止的食材/技法/搭配后 insert"
        - 验证名应简洁概括验证对象（如"霜芯粉增味"）
        - 结论写明实际效果与GMA禁令理由的对比
        - GMA管制级别按禁令严重程度填写（C最轻、S最重）
        - 验证名作key天然唯一，不得重复
    当前黑市:
      check:
        - 到达新城市的黑市时更新
        - 各城市黑市名称不同但互通信息
    当前城市:
      check:
        - 到达新城市时更新
    黑市人脉:
      type: |-
        {
          [人名: string]: {
            所在黑市: string;
            身份: string; // 如"食材商"、"情报贩"、"退休厨师"
            信任度: '低' | '中' | '高';
          }
        }
      check:
        - 在黑市中与某人建立持续交易或合作关系时 insert
        - 信任度随互动深入从低→中→高提升
        - 仅记录有实质合作关系的黑市人脉
    复现技法:
      type: "string[]"
      check:
        - "{{user}}成功复现一种被完全禁止的古代技法时 insert"
        - 用简短名称描述（如"低温腌渍法"）
        - 这是阶段2的核心目标，每次复现应是叙事重大事件
