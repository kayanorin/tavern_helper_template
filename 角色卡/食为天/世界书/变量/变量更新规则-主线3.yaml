---
变量更新规则:
  当前味阶:
    check:
      - 碎片领悟带来实质性味觉成长时更新
      - 使用"序列名·子等级"格式（如"辨味之心·中"）
  传承:
    碎片记录:
      type: |-
        {
          [碎片名: string]: {
            来源: string; // 从哪里/谁那里获得
            类型: '技法' | '理念' | '食谱';
            领悟: string; // 一句话核心要义
            已融汇: boolean; // 阶段3时是否已整合到自己的菜里
          }
        }
      check:
        - "{{user}}理解并掌握一块新碎片后 insert"
        - 碎片名应简洁概括该碎片的核心内容（如"冰水揉面法"）
        - 来源写明获得地点和关键人物
        - 领悟用一句话概括核心要义，要有信息量
        - 已融汇在阶段3时由AI根据叙事判断更新
        - 碎片名作key天然唯一，不得重复
    在场角色:
      type: "string[]"
      check:
        - NPC出现在当前叙事场景时 insert
        - NPC离开当前场景时 remove
    师友录:
      type: |-
        {
          [人名: string]: {
            关系: string; // 如"师傅"、"同道"、"竞争者"
            所在城市: string;
          }
        }
      check:
        - "{{user}}与某人建立有意义的持续关系时 insert"
        - 关系变化时 replace 关系描述
        - 仅记录对主线有影响的重要关系，不含一面之缘的路人
