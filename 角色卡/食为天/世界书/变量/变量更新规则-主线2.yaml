---
变量更新规则:
  当前味阶:
    check:
      - 品尝体验后味阶有实质提升时更新
      - 使用"序列名·子等级"格式（如"辨味之心·中"）
  逆袭:
    清单进度:
      type: |-
        {
          [料理名: string]: {
            食材类别: string; // 对应清单中的食材大类，如"淡水鱼类"
            任务段: number; // 1=平民, 2=高级, 3=传说
            品尝摘要: string;
          }
        }
      check:
        - "{{user}}成功品尝清单上某道料理后 insert 新条目"
        - 料理名由AI根据食材类别指引自行命名
        - 食材类别必须与清单总览中的食材大类一致，同一类别不可重复
        - 任务段根据料理所属阶段填写(1/2/3)
        - 品尝摘要一句话概括味觉体验
        - 料理名作key天然唯一，不得重复
    经济状态:
      type: "'赤贫' | '拮据' | '温饱' | '小康' | '富裕'"
      check:
        - 根据叙事中的经济变化调整档位
        - 打工/做委托/变卖线索 → 可能升档
        - 品尝高级料理/遭遇损失 → 可能降档
        - 每次只升降一档，避免跳跃
    笔记本线索:
      type: |-
        {
          [线索名: string]: {
            类型: '食材渠道' | '人脉' | '食谱' | '产地笔记';
            已使用: boolean;
          }
        }
      check:
        - 发现笔记本中新的有用信息时 insert
        - 使用线索后将已使用改为 true
    突破事件:
      type: "string[]"
      check:
        - 成功突破阶级壁垒时 insert 简要描述
        - 如"获得XX餐厅首次入场资格"、"被XX圈子接纳"

