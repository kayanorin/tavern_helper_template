<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>期刊论文摘要卡片</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f3eee3;
      --paper-bg: #fffdfa;
      --paper-edge: #ece4d6;
      --ink: #24211d;
      --ink-soft: #6f685e;
      --ink-faint: #9b9388;
      --accent: #7b5f3d;
      --accent-soft: #efe6d7;
      --badge-a: #8c6a36;
      --badge-a-bg: #f3ead8;
      --badge-b: #4d6d78;
      --badge-b-bg: #e6eef1;
      --badge-c: #6e7a59;
      --badge-c-bg: #e9eee2;
      --line: #d9d0c1;
      --shadow: 0 12px 28px rgba(56, 46, 34, 0.08);
      --term-hover: #faf6ef;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --page-bg: #23201d;
      --paper-bg: #2b2724;
      --paper-edge: #3c3631;
      --ink: #f6f1e8;
      --ink-soft: #cbc2b5;
      --ink-faint: #978f84;
      --accent: #d8b37c;
      --accent-soft: #43372c;
      --badge-a: #f0ca8f;
      --badge-a-bg: #4b3d2d;
      --badge-b: #b8d3de;
      --badge-b-bg: #32414a;
      --badge-c: #d3ddb7;
      --badge-c-bg: #394133;
      --line: #4b443d;
      --shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      --term-hover: #322d29;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
    }

    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", Georgia, serif;
      background: var(--page-bg);
      color: var(--ink);
      transition: background 0.18s ease, color 0.18s ease;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(100%, 640px);
      margin: 0 auto;
      padding: 16px 14px 22px;
    }

    .page-tools {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .theme-toggle {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.28);
      color: var(--ink-soft);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    .theme-toggle:hover {
      background: var(--paper-bg);
      border-color: var(--accent);
      color: var(--ink);
    }

    .paper-card {
      background: var(--paper-bg);
      border: 1px solid var(--paper-edge);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .journal-bar {
      position: relative;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--line);
      text-align: center;
    }

    .journal-name {
      margin: 0;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.4;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    .journal-badge {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .journal-badge[data-level="A"],
    .journal-badge[data-level="A+"] {
      color: var(--badge-a);
      background: var(--badge-a-bg);
    }

    .journal-badge[data-level="B"] {
      color: var(--badge-b);
      background: var(--badge-b-bg);
    }

    .journal-badge[data-level="C"] {
      color: var(--badge-c);
      background: var(--badge-c-bg);
    }

    .paper-body {
      padding: 22px 20px 18px;
    }

    .paper-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.48rem, 4.6vw, 2rem);
      line-height: 1.38;
      text-align: center;
      font-weight: 700;
    }

    .author-line {
      margin: 14px auto 0;
      max-width: 32rem;
      color: var(--ink-soft);
      text-align: center;
      font-size: 0.94rem;
      line-height: 1.8;
      font-style: italic;
    }

    .keywords-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 18px 0 22px;
    }

    .keyword-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 11px;
      color: var(--ink-soft);
      background: transparent;
      font-size: 0.82rem;
      line-height: 1.2;
    }

    .section {
      margin-top: 18px;
    }

    .section-heading {
      position: relative;
      margin: 0 0 12px;
      padding-bottom: 8px;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .section-heading::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 88px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      border-radius: 999px;
    }

    .abstract-text {
      margin: 0;
      color: var(--ink);
      font-size: 0.98rem;
      line-height: 1.95;
      text-align: justify;
      text-indent: 2em;
      word-break: break-word;
    }

    .term-list {
      display: grid;
      gap: 10px;
    }

    .term-item {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 12px 13px;
      border-left: 3px solid var(--accent);
      border-radius: 0 14px 14px 0;
      background: rgba(255, 255, 255, 0.18);
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    .term-item:hover {
      background: var(--term-hover);
      border-top-color: var(--accent);
      border-right-color: var(--accent);
      border-bottom-color: var(--accent);
      transform: translateX(1px);
    }

    .term-name {
      margin: 0;
      color: var(--accent);
      font-size: 0.92rem;
      line-height: 1.4;
      font-weight: 700;
    }

    .term-definition {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.9rem;
      line-height: 1.72;
    }

    .paper-footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px 14px;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--ink-faint);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .paper-footer strong {
      color: var(--ink-soft);
      font-weight: 700;
    }

    @media (max-width: 560px) {
      .journal-bar {
        padding-right: 16px;
        padding-left: 16px;
      }

      .journal-badge {
        position: static;
        transform: none;
        margin-top: 10px;
      }

      .paper-body {
        padding: 18px 16px 16px;
      }

      .paper-footer {
        flex-direction: column;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-tools">
      <button class="theme-toggle" type="button" data-theme-toggle>切换夜间模式</button>
    </div>
    <div id="app"></div>
  </div>

  <script>
    const rawPaperText = `
期刊: Gastronomic Memory Annals
GMA评级: A
标题: 饮食叙事中的感官记忆层级及其情绪唤起路径
作者: 沈清和
单位: 东南人文研究院·饮食文化实验室
职位: 副研究员 / 通讯作者
关键词: 感官记忆, 饮食叙事, 情绪唤起, 风味建构, 城市文化
摘要:
本研究尝试从文本叙事与感官心理的交叉视角，考察饮食书写中“味觉线索”如何转化为可被读者共享的情绪经验。通过对三十二篇中文饮食随笔与城市记忆文本进行细读，并结合受试者回忆访谈，研究发现：稳定而具体的风味描写，往往并不直接指向“食物本身”，而是作为触发器，唤起个体对时间、空间与关系秩序的再感知。进一步而言，重复出现的嗅觉与口感线索会逐渐形成“风味脚本”，使读者在尚未完成理性判断之前，先进入一种带有温度和方位感的情绪场域。本文据此提出，饮食叙事的有效性并不完全依赖信息密度，而更依赖感官线索与文化语境之间的精确配位。
术语注释:
- 感官记忆: 个体由味觉、嗅觉、触感等感觉线索唤起的经验性记忆结构。
- 风味脚本: 文本中反复出现并可被读者迅速识别的一组风味提示及其叙事预期。
- 情绪场域: 读者在阅读过程中被逐步组织起来的整体情感氛围，而非单一情绪标签。
- 配位: 指感官线索与社会语境、叙事位置之间的对应关系与匹配程度。
投稿日期: 2026-03-24
参考编号: GMA-2026-FOOD-031
`.trim();

    const uiText = {
      abstractLabel: "摘要 / Abstract",
      termsLabel: "术语注释",
      themeDay: "切换夜间模式",
      themeNight: "切换日间模式",
      submitLabel: "投稿日期",
      refLabel: "参考编号"
    };

    const themeStorageKey = "academic-abstract-card-theme";
    const knownFields = new Map([
      ["期刊", "journal"],
      ["期刊名", "journal"],
      ["GMA评级", "gma"],
      ["标题", "title"],
      ["作者", "author"],
      ["单位", "affiliation"],
      ["职位", "position"],
      ["关键词", "keywords"],
      ["摘要", "abstract"],
      ["Abstract", "abstract"],
      ["摘要/Abstract", "abstract"],
      ["术语注释", "terms"],
      ["投稿日期", "submissionDate"],
      ["参考编号", "reference"],
      ["DOI", "reference"]
    ]);

    function normalizeKey(key) {
      return key.replace(/\s+/g, "").trim();
    }

    function parseTermLine(line, terms) {
      const match = line.match(/^[-•]\s*([^:：]+)\s*[:：]\s*(.+)$/);
      if (match) {
        terms.push({
          term: match[1].trim(),
          definition: match[2].trim()
        });
        return true;
      }

      if (terms.length) {
        terms[terms.length - 1].definition += line.trim();
        return true;
      }

      return false;
    }

    function parseStructuredText(text) {
      const paper = {
        journal: "",
        gma: "A",
        title: "",
        author: "",
        affiliation: "",
        position: "",
        keywords: [],
        abstract: "",
        terms: [],
        submissionDate: "",
        reference: ""
      };

      const abstractLines = [];
      let currentBlock = "";

      text.split(/\r?\n/).forEach((rawLine) => {
        const line = rawLine.trim();

        if (!line) {
          if (currentBlock === "abstract" && abstractLines[abstractLines.length - 1] !== "") {
            abstractLines.push("");
          }
          return;
        }

        const pairMatch = line.match(/^([^:：]+)\s*[:：]\s*(.*)$/);
        const normalizedKey = pairMatch ? normalizeKey(pairMatch[1]) : "";
        const field = knownFields.get(normalizedKey) || knownFields.get(pairMatch ? pairMatch[1].trim() : "");

        if (pairMatch && field) {
          const value = pairMatch[2].trim();

          if (field === "abstract") {
            currentBlock = "abstract";
            if (value) {
              abstractLines.push(value);
            }
            return;
          }

          if (field === "terms") {
            currentBlock = "terms";
            if (value) {
              parseTermLine(value, paper.terms);
            }
            return;
          }

          currentBlock = "";
          if (field === "keywords") {
            paper.keywords = value.split(/[，,、]/).map((item) => item.trim()).filter(Boolean);
          } else {
            paper[field] = value;
          }
          return;
        }

        if (currentBlock === "abstract") {
          abstractLines.push(line);
          return;
        }

        if (currentBlock === "terms") {
          parseTermLine(line, paper.terms);
        }
      });

      paper.abstract = abstractLines.join("\n").trim();
      return paper;
    }

    function getBadgeLevel(gma) {
      const value = String(gma || "").toUpperCase();
      if (value === "A" || value === "A+") return value;
      if (value === "B") return "B";
      return "C";
    }

    function renderKeywords(keywords) {
      return keywords.map((keyword) => `<span class="keyword-pill">${keyword}</span>`).join("");
    }

    function renderTerms(terms) {
      return terms.map((item) => `
        <div class="term-item">
          <dt class="term-name">${item.term}</dt>
          <dd class="term-definition">${item.definition}</dd>
        </div>
      `).join("");
    }

    function renderPaperCard(paper) {
      const authorParts = [paper.author, paper.affiliation, paper.position].filter(Boolean);
      const badgeLevel = getBadgeLevel(paper.gma);

      return `
        <article class="paper-card">
          <header class="journal-bar">
            <h1 class="journal-name">${paper.journal}</h1>
            <span class="journal-badge" data-level="${badgeLevel}">GMA ${paper.gma}</span>
          </header>

          <div class="paper-body">
            <h2 class="paper-title">${paper.title}</h2>
            <p class="author-line">${authorParts.join(" · ")}</p>

            <div class="keywords-row">
              ${renderKeywords(paper.keywords)}
            </div>

            <section class="section">
              <h3 class="section-heading">${uiText.abstractLabel}</h3>
              <p class="abstract-text">${paper.abstract}</p>
            </section>

            <section class="section">
              <h3 class="section-heading">${uiText.termsLabel}</h3>
              <dl class="term-list">
                ${renderTerms(paper.terms)}
              </dl>
            </section>

            ${(paper.submissionDate || paper.reference) ? `
              <footer class="paper-footer">
                ${paper.submissionDate ? `<span><strong>${uiText.submitLabel}</strong> ${paper.submissionDate}</span>` : ""}
                ${paper.reference ? `<span><strong>${uiText.refLabel}</strong> ${paper.reference}</span>` : ""}
              </footer>
            ` : ""}
          </div>
        </article>
      `;
    }

    function applyTheme(theme) {
      const nextTheme = theme === "dark" ? "dark" : "light";
      document.body.dataset.theme = nextTheme;
      localStorage.setItem(themeStorageKey, nextTheme);

      const toggle = document.querySelector("[data-theme-toggle]");
      if (toggle) {
        toggle.textContent = nextTheme === "dark" ? uiText.themeNight : uiText.themeDay;
      }
    }

    function bindThemeToggle() {
      document.addEventListener("click", (event) => {
        const toggle = event.target.closest("[data-theme-toggle]");
        if (!toggle) {
          return;
        }

        applyTheme(document.body.dataset.theme === "dark" ? "light" : "dark");
      });
    }

    function init() {
      const paper = parseStructuredText(rawPaperText);
      document.getElementById("app").innerHTML = renderPaperCard(paper);

      const savedTheme = localStorage.getItem(themeStorageKey);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(savedTheme || (prefersDark ? "dark" : "light"));
      console.info("Academic abstract card rendered.");
    }

    bindThemeToggle();
    init();
  </script>
</body>
</html>
