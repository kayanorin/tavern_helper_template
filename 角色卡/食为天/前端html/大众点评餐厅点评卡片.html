<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scandi 餐厅点评组件</title>
  <style>
    :root {
      color-scheme: light;
      --canvas: #f6f4ef;
      --surface: #fbfaf7;
      --surface-strong: #ffffff;
      --surface-soft: #f1eee7;
      --surface-hover: #f5f3ee;
      --border: #ddd8cf;
      --border-strong: #c6c0b6;
      --text: #27302b;
      --text-soft: #667169;
      --title: #1f2622;
      --shadow: 0 10px 24px rgba(53, 63, 56, 0.08);
      --sage: #7f9d89;
      --sage-soft: #e4ece6;
      --sky: #87a9bb;
      --sky-soft: #e6eef2;
      --warm: #d8b576;
      --warm-soft: #f3ecde;
      --star: #cfad72;
      --star-off: #c4c0b9;
      --action-active: #eef3ee;
    }

    body[data-theme="night"] {
      color-scheme: dark;
      --canvas: #232927;
      --surface: #262d2b;
      --surface-strong: #2d3432;
      --surface-soft: #313938;
      --surface-hover: #313938;
      --border: #404845;
      --border-strong: #59615e;
      --text: #edf1ee;
      --text-soft: #bcc8c0;
      --title: #f7faf7;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      --sage: #a9c0b0;
      --sage-soft: #33413a;
      --sky: #a6bfce;
      --sky-soft: #33414a;
      --warm: #d8c08d;
      --warm-soft: #433d30;
      --star: #e2c07f;
      --star-off: #707874;
      --action-active: #37403d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
    }

    body {
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: transparent;
      color: var(--text);
    }

    button,
    input,
    summary {
      font: inherit;
    }

    #app {
      width: 100%;
    }

    .widget-wrap {
      width: min(100%, 940px);
    }

    .review-widget {
      width: 100%;
      background: var(--canvas);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .review-widget summary,
    .review-item summary {
      list-style: none;
      cursor: pointer;
    }

    .review-widget summary::-webkit-details-marker,
    .review-item summary::-webkit-details-marker {
      display: none;
    }

    .widget-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      transition: background 0.16s ease, border-color 0.16s ease;
    }

    .widget-summary:hover {
      background: var(--surface-hover);
    }

    .summary-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .summary-kicker {
      margin: 0;
      color: var(--sage);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .summary-title {
      margin: 0;
      color: var(--title);
      font-size: 1.04rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .summary-subtitle {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .summary-side {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .summary-chip,
    .summary-toggle,
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text-soft);
      padding: 7px 12px;
      font-size: 0.84rem;
      white-space: nowrap;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    .summary-toggle .open-text,
    .review-toggle .open-text {
      display: none;
    }

    .review-widget[open] .summary-toggle .open-text,
    .review-item[open] .review-toggle .open-text {
      display: inline;
    }

    .review-widget[open] .summary-toggle .closed-text,
    .review-item[open] .review-toggle .closed-text {
      display: none;
    }

    .widget-body {
      display: grid;
      gap: 16px;
      padding: 16px 18px 18px;
      border-top: 1px solid var(--border);
    }

    .toolbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .toolbar-copy {
      min-width: 0;
    }

    .toolbar-title {
      margin: 0;
      color: var(--title);
      font-size: 1.1rem;
      line-height: 1.35;
    }

    .toolbar-subtitle {
      margin: 6px 0 0;
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .theme-toggle {
      cursor: pointer;
    }

    .theme-toggle:hover,
    .tab-btn:hover,
    .action-btn:hover {
      background: var(--surface-hover);
      border-color: var(--border-strong);
      color: var(--text);
    }

    .tab-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px;
      border-radius: 18px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
    }

    .tab-btn {
      min-width: 0;
      flex: 1 1 180px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-soft);
      border-radius: 14px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    .tab-btn strong {
      display: block;
      font-size: 0.95rem;
      line-height: 1.4;
      color: inherit;
      margin-bottom: 2px;
    }

    .tab-btn span {
      display: block;
      font-size: 0.8rem;
      line-height: 1.45;
      color: inherit;
      opacity: 0.9;
    }

    .tab-btn.is-active {
      background: var(--surface-strong);
      border-color: var(--border);
      color: var(--text);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02);
    }

    .panel {
      display: grid;
      gap: 14px;
      padding: 16px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .panel-title-group {
      min-width: 0;
    }

    .panel-title {
      margin: 0;
      color: var(--title);
      font-size: clamp(1.18rem, 2vw, 1.42rem);
      line-height: 1.3;
    }

    .panel-subtitle {
      margin: 6px 0 0;
      color: var(--text-soft);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .panel-head-side {
      display: grid;
      gap: 8px;
      justify-items: end;
      flex-shrink: 0;
    }

    .price-pill,
    .meta-pill,
    .tag,
    .tone-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      line-height: 1.2;
      border: 1px solid transparent;
    }

    .price-pill {
      background: var(--warm-soft);
      color: var(--warm);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta-pill {
      background: var(--surface-soft);
      color: var(--text-soft);
      border-color: var(--border);
    }

    .tone-chip--sage,
    .tag--sage {
      background: var(--sage-soft);
      color: var(--sage);
    }

    .tone-chip--sky,
    .tag--sky {
      background: var(--sky-soft);
      color: var(--sky);
    }

    .tone-chip--warm,
    .tag--warm {
      background: var(--warm-soft);
      color: var(--warm);
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .score-badge {
      font-size: 1rem;
      font-weight: 700;
      color: var(--title);
    }

    .rating-shell {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .rating-note {
      color: var(--text-soft);
      font-size: 0.84rem;
    }

    .rating {
      display: flex;
      flex-direction: row-reverse;
      gap: 4px;
    }

    .rating input {
      display: none;
    }

    .rating label {
      display: inline-flex;
      cursor: pointer;
    }

    .rating svg,
    .static-stars svg {
      width: 16px;
      height: 16px;
      fill: transparent;
      stroke: var(--star-off);
      stroke-width: 1.9;
      transition: fill 0.16s ease, stroke 0.16s ease, transform 0.16s ease;
    }

    .rating label:hover svg,
    .rating label:hover ~ label svg,
    .rating input:checked ~ label svg {
      fill: var(--star);
      stroke: var(--star);
      transform: translateY(-1px);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(270px, 0.96fr);
      gap: 14px;
    }

    .stack {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .section-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface-strong);
      padding: 14px;
    }

    .section-label {
      margin: 0 0 8px;
      color: var(--text-soft);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dish-title {
      margin: 0;
      color: var(--title);
      font-size: 1rem;
      line-height: 1.45;
    }

    .dish-desc,
    .section-note {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .reviews-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .reviews-head h3 {
      margin: 0;
      color: var(--title);
      font-size: 0.98rem;
    }

    .reviews-head span {
      color: var(--text-soft);
      font-size: 0.82rem;
    }

    .review-list {
      display: grid;
      gap: 8px;
    }

    .review-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
    }

    .review-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      transition: background 0.16s ease;
    }

    .review-summary:hover {
      background: var(--surface-hover);
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background: var(--surface-soft);
      color: var(--title);
      font-weight: 700;
      font-size: 0.88rem;
    }

    .review-info {
      min-width: 0;
      flex: 1;
    }

    .review-info strong {
      display: block;
      color: var(--title);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .review-info span {
      display: block;
      color: var(--text-soft);
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .review-side {
      display: grid;
      justify-items: end;
      gap: 4px;
    }

    .static-stars {
      display: inline-flex;
      gap: 2px;
    }

    .static-stars .is-filled {
      fill: var(--star);
      stroke: var(--star);
    }

    .review-date {
      color: var(--text-soft);
      font-size: 0.78rem;
    }

    .review-toggle {
      flex-shrink: 0;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text-soft);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .review-text {
      margin: 0;
      padding: 0 12px 12px;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.72;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-strong);
      color: var(--text-soft);
      padding: 7px 12px;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    .action-btn.is-active {
      background: var(--action-active);
      border-color: var(--border-strong);
      color: var(--title);
    }

    @media (max-width: 780px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      .toolbar,
      .panel-head,
      .widget-summary {
        align-items: flex-start;
      }
    }

    @media (max-width: 620px) {
      .widget-summary,
      .toolbar,
      .panel-head,
      .review-summary {
        flex-direction: column;
      }

      .summary-side,
      .panel-head-side,
      .review-side {
        width: 100%;
        justify-content: flex-start;
      }

      .theme-toggle {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
    }
  </style>
</head>
<body>

  <script>

          tags: ["必点招牌", "约会氛围", "服务在线"],
          reviews: [

        },
        {

          },
          tags: ["下饭王者", "朋友聚餐", "排队热店"],
          reviews: [
            {

              title: "家常菜爱好者",
              date: "2026.03.30",

          ],
          actions: {

            save: { count: 111, active: false },

          }
        },
        {
          id: "tanlu",
          rank: 3,
          accent: "warm",
          name: "炭路烧味铺",
          cuisine: "广式烧味",

          score: 4.5,
          userRating: 4,
          address: "黄浦区复兴东路 118 号沿街",

          },
          tags: ["性价比高", "午餐快选", "外带方便"],
          reviews: [
            {
              avatar: "阿",
              name: "阿澈",
              title: "打工人午餐雷达",
              date: "2026.03.28",
              rating: 4,
              expanded: false,
              text: "出餐很快，叉烧边缘有一点焦糖感，中午来点双拼基本不会踩雷。"
            },
            {
              avatar: "宋",
              name: "宋晚饭",
              title: "轻食切换失败者",
              date: "2026.03.25",
              rating: 5,
              expanded: false,
              text: "油鸡的嫩度很稳，份量不夸张，但酱汁和米饭配得特别舒服。"
            }
          ],
          actions: {
            like: { count: 154, active: false },
            save: { count: 87, active: false },
            comment: { count: 19, active: false }
          }
        }
      ]
    };

    const state = {
      activeRestaurantId: appData.restaurants[0].id,
      widgetOpen: !appData.widget.collapsed,
      theme: "day"
    };

    const themeStorageKey = "scandi-restaurant-review-theme";
    const starPath = "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z";
    const tones = ["sage", "sky", "warm"];

    function getActiveRestaurant() {
      return appData.restaurants.find((restaurant) => restaurant.id === state.activeRestaurantId) || appData.restaurants[0];
    }

    function createStarSvg(className = "") {
      return `
        <svg class="${className}" viewBox="0 0 24 24" aria-hidden="true">
          <path d="${starPath}"></path>
        </svg>
      `;
    }

    function renderInteractiveRating(restaurant) {
      const selected = restaurant.userRating || Math.round(restaurant.score);
      const stars = Array.from({ length: 5 }, (_, index) => {
        const value = 5 - index;
        const id = `${restaurant.id}-rating-${value}`;

        return `
          <input type="radio" id="${id}" name="${restaurant.id}-rating" value="${value}" ${value === selected ? "checked" : ""}>
          <label for="${id}" title="${value} 星">
            ${createStarSvg()}
          </label>
        `;
      }).join("");

      return `
        <div class="rating-shell">
          <div class="rating" aria-label="可交互星级评分">
            ${stars}
          </div>
          <span class="rating-note" data-rating-note>${appData.ui.ratingHint}</span>
        </div>
      `;
    }

    function renderStaticStars(value) {
      return `
        <span class="static-stars" aria-label="${value} 星">
          ${Array.from({ length: 5 }, (_, index) => createStarSvg(index < value ? "is-filled" : "")).join("")}
        </span>
      `;
    }

    function renderToneTag(tag, index) {
      const tone = tones[index % tones.length];
      return `<span class="tag tag--${tone}">${tag}</span>`;
    }

    function renderActions(restaurant) {
      return `
        <div class="action-bar">
          ${Object.entries(restaurant.actions).map(([key, action]) => `
            <button
              class="action-btn ${action.active ? "is-active" : ""}"
              type="button"
              data-action="${key}"
              data-restaurant-id="${restaurant.id}"
            >
              ${appData.ui.actions[key]} ${action.count}
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderReview(review, restaurantId, reviewIndex) {
      const openAttr = review.expanded ? " open" : "";
      const reviewId = `${restaurantId}-review-${reviewIndex}`;

      return `
        <details class="review-item"${openAttr} data-review-id="${reviewId}">
          <summary class="review-summary">
            <div class="avatar" aria-hidden="true">${review.avatar}</div>
            <div class="review-info">
              <strong>${review.name}</strong>
              <span>${review.title}</span>
            </div>
            <div class="review-side">
              ${renderStaticStars(review.rating)}
              <time class="review-date" datetime="${review.date.replace(/\./g, "-")}">${review.date}</time>
            </div>
            <span class="review-toggle" aria-hidden="true">
              <span class="closed-text">${appData.ui.reviewExpand}</span>
              <span class="open-text">${appData.ui.reviewCollapse}</span>
            </span>
          </summary>
          <p class="review-text">${review.text}</p>
        </details>
      `;
    }

    function renderTabs() {
      return `
        <div class="tab-list" role="tablist" aria-label="餐厅标签页">
          ${appData.restaurants.map((restaurant) => `
            <button
              class="tab-btn ${restaurant.id === state.activeRestaurantId ? "is-active" : ""}"
              type="button"
              role="tab"
              aria-selected="${restaurant.id === state.activeRestaurantId}"
              data-tab-id="${restaurant.id}"
            >
              <strong>${restaurant.name}</strong>
              <span>${restaurant.cuisine} · ${restaurant.score.toFixed(1)} 分</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderSummary(activeRestaurant) {
      return `
        <summary class="widget-summary">
          <div class="summary-copy">
            <p class="summary-kicker">${appData.widget.kicker}</p>
            <h1 class="summary-title">${appData.widget.title}</h1>
            <p class="summary-subtitle">
              当前查看 ${activeRestaurant.name} · ${appData.ui.summaryScoreLabel} ${activeRestaurant.score.toFixed(1)} · ${activeRestaurant.reviews.length} ${appData.ui.reviewsSuffix}
            </p>
          </div>
          <div class="summary-side">
            <span class="summary-chip">${appData.restaurants.length} ${appData.ui.summaryCountSuffix}</span>
            <span class="summary-toggle" aria-hidden="true">
              <span class="closed-text">${appData.ui.widgetExpand}</span>
              <span class="open-text">${appData.ui.widgetCollapse}</span>
            </span>
          </div>
        </summary>
      `;
    }

    function renderPanel(restaurant) {
      return `
        <section class="panel" role="tabpanel" aria-label="${restaurant.name}">
          <div class="panel-head">
            <div class="panel-title-group">
              <h2 class="panel-title">${restaurant.name}</h2>
              <p class="panel-subtitle">${restaurant.overview}</p>
            </div>
            <div class="panel-head-side">
              <span class="price-pill">${restaurant.price}</span>
              <span class="tone-chip tone-chip--${restaurant.accent}">${restaurant.cuisine}</span>
            </div>
          </div>

          <div class="meta-row">
            <span class="meta-pill">${appData.ui.addressLabel} · ${restaurant.address}</span>
            <span class="meta-pill">${appData.ui.hoursLabel} · ${restaurant.hours}</span>
          </div>

          <div class="rating-row">
            <span class="score-badge">${restaurant.score.toFixed(1)}</span>
            ${renderInteractiveRating(restaurant)}
          </div>

          <div class="content-grid">
            <div class="stack">
              <section class="section-card">
                <p class="section-label">${appData.ui.signatureLabel}</p>
                <h3 class="dish-title">${restaurant.signatureDish.name}</h3>
                <p class="dish-desc">${restaurant.signatureDish.description}</p>
              </section>

              <section class="section-card">
                <p class="section-label">${appData.ui.tagsLabel}</p>
                <div class="tag-row">
                  ${restaurant.tags.map(renderToneTag).join("")}
                </div>
              </section>

              <section class="section-card">
                <p class="section-label">${appData.ui.actionTitle}</p>
                <p class="section-note">${appData.ui.actionNote}</p>
                ${renderActions(restaurant)}
              </section>
            </div>

            <section class="section-card">
              <div class="reviews-head">
                <h3>${appData.ui.reviewsTitle}</h3>
                <span>${restaurant.reviews.length} ${appData.ui.reviewsSuffix}</span>
              </div>
              <div class="review-list">
                ${restaurant.reviews.map((review, index) => renderReview(review, restaurant.id, index)).join("")}
              </div>
            </section>
          </div>
        </section>
      `;
    }

    function renderApp() {
      const app = document.getElementById("app");
      const activeRestaurant = getActiveRestaurant();

      app.innerHTML = `
        <div class="widget-wrap">
          <details class="review-widget"${state.widgetOpen ? " open" : ""} data-widget-root>
            ${renderSummary(activeRestaurant)}
            <div class="widget-body">
              <div class="toolbar">
                <div class="toolbar-copy">
                  <h2 class="toolbar-title">${appData.widget.expandedTitle}</h2>
                  <p class="toolbar-subtitle">${appData.widget.expandedSubtitle}</p>
                </div>
                <button class="theme-toggle" type="button" data-theme-toggle>
                  ${state.theme === "night" ? appData.ui.themeNight : appData.ui.themeDay}
                </button>
              </div>

              ${renderTabs()}
              ${renderPanel(activeRestaurant)}
            </div>
          </details>
        </div>
      `;
    }

    function applyTheme(theme) {
      state.theme = theme === "night" ? "night" : "day";
      document.body.dataset.theme = state.theme;
      localStorage.setItem(themeStorageKey, state.theme);

      const toggle = document.querySelector("[data-theme-toggle]");
      if (toggle) {
        toggle.textContent = state.theme === "night" ? appData.ui.themeNight : appData.ui.themeDay;
      }
    }

    function updateDetailsState() {
      const widget = document.querySelector("[data-widget-root]");
      if (widget) {
        state.widgetOpen = widget.open;
      }

      appData.restaurants.forEach((restaurant) => {
        restaurant.reviews.forEach((review, index) => {
          const element = document.querySelector(`[data-review-id="${restaurant.id}-review-${index}"]`);
          if (element) {
            review.expanded = element.open;
          }
        });
      });
    }

    function bindEvents() {
      document.addEventListener("click", (event) => {
        const tab = event.target.closest("[data-tab-id]");
        if (tab) {
          state.activeRestaurantId = tab.dataset.tabId;
          renderApp();
          applyTheme(state.theme);
          return;
        }

        const themeToggle = event.target.closest("[data-theme-toggle]");
        if (themeToggle) {
          applyTheme(state.theme === "night" ? "day" : "night");
          return;
        }

        const actionButton = event.target.closest("[data-action][data-restaurant-id]");
        if (actionButton) {
          const restaurant = appData.restaurants.find((item) => item.id === actionButton.dataset.restaurantId);
          const action = restaurant ? restaurant.actions[actionButton.dataset.action] : null;

          if (!restaurant || !action) {
            return;
          }

          action.active = !action.active;
          action.count += action.active ? 1 : -1;
          renderApp();
          applyTheme(state.theme);
        }
      });

      document.addEventListener("change", (event) => {
        const input = event.target;
        if (!(input instanceof HTMLInputElement) || !input.name.endsWith("-rating")) {
          return;
        }

        const restaurantId = input.name.replace("-rating", "");
        const restaurant = appData.restaurants.find((item) => item.id === restaurantId);
        if (!restaurant) {
          return;
        }

        restaurant.userRating = Number(input.value);
        const note = input.closest(".rating-shell")?.querySelector("[data-rating-note]");
        if (note) {
          note.textContent = `${appData.ui.ratingResultPrefix}${input.value}${appData.ui.ratingResultSuffix}`;
        }
      });

      document.addEventListener("toggle", (event) => {
        if (!(event.target instanceof HTMLElement)) {
          return;
        }

        if (event.target.matches("[data-widget-root], .review-item")) {
          updateDetailsState();
        }
      }, true);
    }

    function init() {
      const savedTheme = localStorage.getItem(themeStorageKey);
      const prefersNight = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      state.theme = savedTheme || (prefersNight ? "night" : "day");
      renderApp();
      applyTheme(state.theme);
    }

    bindEvents();
    init();
  </script>
</body>
</html>
