<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>民俗童谣卡片</title>
  <style>
    @import url("https://fontsapi.zeoseven.com/492/main/result.css");
    @import url("https://fontsapi.zeoseven.com/629/main/result.css");
    @import url("https://fontsapi.zeoseven.com/16/main/result.css");
    @import url('https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Long+Cang&family=Ma+Shan+Zheng&display=swap');

    :root {
      color-scheme: light;
      --bg: #d7c3a1;
      --paper: #f5ecd7;
      --paper-deep: #e7d3ae;
      --paper-note: #f1e5ca;
      --ink: #4a3728;
      --ink-soft: #6d5542;
      --line: #a78358;
      --accent: #7f4f29;
      --accent-soft: rgba(140, 92, 52, 0.12);
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #1b160f;
      --paper: #2a2218;
      --paper-deep: #34281d;
      --paper-note: #30251b;
      --ink: #d4b896;
      --ink-soft: #b59a7a;
      --line: #8a6d4d;
      --accent: #e0c49b;
      --accent-soft: rgba(212, 184, 150, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      /* 使用手写字体优先级更高，如果不支持使用楷体 */
      font-family: "PING FANG CHANG AN", "Long Cang", "Kaiti SC", "STKaiti", "KaiTi", "楷体", serif;
      background:
        radial-gradient(circle at top, rgba(255, 243, 214, 0.3), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 30%),
        var(--bg);
      color: var(--ink);
      transition: background 0.18s ease, color 0.18s ease;
      font-size: 1.15rem;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(100%, 800px);
      margin: 0 auto;
      padding: clamp(12px, 2vw, 24px) clamp(12px, 2vw, 24px) 22px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .theme-toggle {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.18);
      color: var(--ink-soft);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: all 0.16s ease;
      font-family: "PING FANG CHANG AN", "Kaiti SC", "STKaiti", "KaiTi", "楷体", serif;
    }

    .theme-toggle:hover {
      background: var(--paper);
      border-color: var(--accent);
      color: var(--ink);
    }

    .folklore-card-container {
      position: relative;
      margin: 2em 0;
      width: 100%;
    }

    .parchment-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--paper);
      /* Base64 杂色纹理模拟羊皮纸 */
      background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW17e3t1dXWBgYGHh4d5eXlzc3OLi4ubm5uVlZWPj4+NjY19fX2JiYl/f39ra2uRkZGZmZlpaWmXl5dvb29xcXGTk5NnZ2c8TV1mAAAAG3RSTlNAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEAvEOwtAAAFVklEQVR4XpWWB67c2BUFb3g557T/hRo9/WUMZHlgr4Bg8Z4qQgQJlHI4A8SzFVrapvmTF9O7dmYRFZ60YiBhJRCgh1FYhiLAmdvX0CzTOpNE77ME0Zty/nWWzchDtiqrmQDeuv3powQ5ta2eN0FY0InkqDD73lT9c9lEzwUNqgFHs9VQce3TVClFCQrSTfOiYkVJQBmpbq2L6iZavPnAPcoU0dSw0SUTqz/GtrGuXfbyyBniKykOWQWGqwwMA7QiYAxi+IlPdqo+hYHnUt5ZPfnsHJyNiDtnpJyayNBkF6cWoYGAMY92U2hXHF/C1M8uP/ZtYdiuj26UdAdQQSXQErwSOMzt/XWRWAz5GuSBIkwG1H3FabJ2OsUOUhGC6tK4EMtJO0ttC6IBD3kM0ve0tJwMdSfjZo+EEISaeTr9P3wYrGjXqyC1krcKdhMpxEnt5JetoulscpyzhXN5FRpuPHvbeQaKxFAEB6EN+cYN6xD7RYGpXpNndMmZgM5Dcs3YSNFDHUo2LGfZuukSWyUYirJAdYbF3MfqEKmjM+I2EfhA94iG3L7uKrR+GdWD73ydlIB+6hgref1QTlmgmbM3/LeX5GI1Ux1RWpgxpLuZ2+I+IjzZ8wqE4nilvQdkUdfhzI5QDWy+kw5Wgg2pGpeEVeCCA7b85BO3F9DzxB3cdqvBzWcmzbyMiqhzuYqtHRVG2y4x+KOlnyqla8AoWWpuBoYRxzXrfKuILl6SfiWCbjxoZJUaCBj1CjH7GIaDbc9kqBY3W/Rgjda1iqQcOJu2WW+76pZC9QG7M00dffe9hNnseupFL53r8F7YHSwJWUKP2q+k7RdsxyOB11n0xtOvnW4irMMFNV4H0uqwS5ExsmP9AxbDTc9JwgneAT5vTiUSm1E7BSflSt3bfa1tv8Di3R8n3Af7MNWzs49hmauE2wP+ttrq+AsWpFG2awvsuOqbipWHgtuvuaAE+A1Z/7gC9hesnr+7wqCwG8c5yAg3AL1fm8T9AZtp/bbJGwl1pNrE7RuOX7PeMRUERVaPpEs+yqeoSmuOlokqw49pgomjLeh7icHNlG19yjs6XXOMedYm5xH2YxpV2tc0Ro2jJfxC50ApuxGob7lMsxfTbeUv07TyYxpeLucEH1gNd4IKH2LAg5TdVhlCafZvpskfncCfx8pOhJzd76bJWeYFnFciwcYfubRc12Ip/ppIhA1/mSZ/RxjFDrJC5xifFjJpY2Xl5zXdguFqYyTR1zSp1Y9p+tktDYYSNflcxI0iyO4TPBdlRcpeqjK/piF5bklq77VSEaA+z8qmJTFzIWiitbnzR794USKBUaT0NTEsVjZqLaFVqJoPN9ODG70IPbfBHKK+/q/AWR0tJzYHRULOa4MP+W/HfGadZUbfw177G7j/OGbIs8TahLyynl4X4RinF793Oz+BU0saXtUHrVBFT/DnA3ctNPoGbs4hRIjTok8i+algT1lTHi4SxFvONKNrgQFAq2/gFnWMXgwffgYMJpiKYkmW3tTg3ZQ9Jq+f8XN+A5eeUKHWvJWJ2sgJ1Sop+wwhqFVijqWaJhwtD8MNlSBeWNNWTa5Z5kPZw5+LbVT99wqTdx29lMUH4OIG/D86ruKEauBjvH5xy6um/Sfj7ei6UUVk4AIl3MyD4MSSTOFgSwsH/QJWaQ5as7ZcmgBZkzjjU1UrQ74ci1gWBCSGHtuV1H2mhSnO3Wp/3fEV5a+4w       /* 羊皮纸破损边缘阴影 */
      box-shadow: 2px 3px 20px rgba(84, 58, 34, 0.4), 0 0 120px rgba(143, 89, 34, 0.25) inset;
      /* 通过 SVG filter 制造真实的边缘不规则侵蚀感 */
      filter: url(#wavy2);
      z-index: 1;
    }

    body[data-theme="dark"] .parchment-bg {
      background-blend-mode: multiply;
      box-shadow: 2px 3px 20px rgba(0, 0, 0, 0.6), 0 0 120px rgba(0, 0, 0, 0.45) inset;
    }

    .parchment-content {
      position: relative;
      z-index: 2;
      padding: clamp(3em, 6vw, 4.5em) clamp(2em, 5vw, 3.5em);
    }

    .parchment-content::selection,
    .parchment-content *::selection {
      background: var(--accent-soft);
    }

    .header {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 12px;
      font-size: 28px;
      color: var(--ink-soft);
      font-family: 'YuFanXinYu';
      font-weight: bold;
      transform: rotate(-1deg);
      opacity: 0.85;
    }

    .title {
      margin: 0;
      color: var(--ink);
      font-family: 'PING FANG CHANG AN', 'Zhi Mang Xing', 'Ma Shan Zheng', cursive;
      font-size: clamp(2.4rem, 6vw, 3.2rem);
      line-height: 1.2;
      text-align: center;
      text-shadow: 1px 1px 0 rgba(255, 248, 235, 0.3);
      letter-spacing: 0.05em;
      font-weight: normal;
    }

    .subtitle {
      margin: 0;
      color: var(--ink-soft);
      font-size: 1.1rem;
      line-height: 1.6;
      text-align: center;
      opacity: 0.9;
    }

    .content {
      display: grid;
      gap: 20px;
    }

    .story-block {
      color: var(--ink);
      font-size: 1.25rem;
      line-height: 2.2;
      text-align: left;
      word-break: break-word;
      letter-spacing: 0.05em;
    }

    .story-block p {
      margin: 0;
      text-indent: 1.5em;
    }

    .story-block p + p {
      margin-top: 14px;
    }



    .rhyme-block {
      display: grid;
      gap: 12px;
      padding: 10px 0;
      text-align: center;
      color: var(--ink);
    }

    .rhyme-line {
      font-size: 1.3rem;
      line-height: 2.2;
      letter-spacing: 0.1em;
    }

    .rhyme-line:nth-child(2n) {
      color: var(--ink-soft);
    }

    .annotation {
      position: relative;
      margin-top: 10px;
      padding: 12px 18px;
    }

    .annotation::before {
      content: "注：";
      display: block;
      margin-bottom: 4px;
      color: var(--accent);
      font-size: 1.1rem;
      font-family: 'MaokenYingBiKaiShuJ', 'Zhi Mang Xing', 'Ma Shan Zheng', cursive;
    }

    .annotation-text {
      margin: 0;
      color: var(--ink-soft);
      font-size: 1.05rem;
      line-height: 2;
    }

    .footer {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      margin-top: 30px;
      padding-top: 10px;
      color: var(--ink-soft);
      font-size: 0.95rem;
      line-height: 1.5;
      transform: rotate(-1deg);
    }

    .footer strong {
      color: var(--ink);
      margin-right: 4px;
    }

    @media (max-width: 480px) {
      .parchment-content {
        padding: 3em 2em;
      }

      .meta-row {
        justify-content: flex-start;
      }
    }
</style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <button class="theme-toggle" type="button" data-theme-toggle>切换夜间模式</button>
    </div>
    <div id="app"></div>
  </div>
    <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute;">
    <filter id="wavy2">
      <feTurbulence x="0" y="0" baseFrequency="0.02" numOctaves="5" seed="1" />
      <feDisplacementMap in="SourceGraphic" scale="18" />
    </filter>
  </svg>

  <script>
    const rawFolkloreText = `
类型: 地方传说
标题: 灶烟桥的红灯火
地区: 江南水巷
流传度: 县域流传
副题: 关于夜归人为何总会在桥头放慢脚步的一则旧说
正文:
传说旧时镇外有一座木桥，桥边住着守灶的老妇。每逢深秋水雾起时，晚归的人远远看见桥头灯火，总疑心那灯并不挂在屋檐下，而像是浮在潮气里。
有人说，那是老妇怕行船人摸黑撞桥，便在灶间添一盏小灯，灯火顺着烟气慢慢升高，于是桥和河道都被照见。也有人说，那灯其实不是给活人看的，而是替迷路的旧魂照回家的路。
后来老妇去世，桥边小屋也早已拆了，可镇上人夜里过桥时仍爱把脚步放轻，说是怕惊了那一点还在水气里晃动的暖光。
注解:
这类“桥头灯火”传说常见于江南水网地区，其核心并不在于鬼魅惊悚，而在于借微弱灯火维系地方共同体对“归路”与“守望”的想象。
记录时间: 2026-03-31
档号: FOLK-LEGEND-017
`.trim();

    const uiText = {
      themeDay: "切换夜间模式",
      themeNight: "切换日间模式"
    };

    const themeStorageKey = "folklore-card-theme";
    const knownFields = new Map([
      ["类型", "type"],
      ["标题", "title"],
      ["地区", "region"],
      ["流传度", "circulation"],
      ["副题", "subtitle"],
      ["正文", "body"],
      ["注解", "annotation"],
      ["记录时间", "recordedAt"],
      ["档号", "reference"]
    ]);

    function parseStructuredText(text) {
      const card = {
        type: "地方传说",
        title: "",
        region: "",
        circulation: "",
        subtitle: "",
        body: "",
        annotation: "",
        recordedAt: "",
        reference: ""
      };

      const bodyLines = [];
      const noteLines = [];
      let currentBlock = "";

      text.split(/\r?\n/).forEach((rawLine) => {
        const line = rawLine.trim();
        if (!line) {
          if (currentBlock === "body") {
            bodyLines.push("");
          }
          if (currentBlock === "annotation") {
            noteLines.push("");
          }
          return;
        }

        const pairMatch = line.match(/^([^:：]+)\s*[:：]\s*(.*)$/);
        const key = pairMatch ? pairMatch[1].trim() : "";
        const field = knownFields.get(key);

        if (pairMatch && field) {
          const value = pairMatch[2].trim();

          if (field === "body") {
            currentBlock = "body";
            if (value) {
              bodyLines.push(value);
            }
            return;
          }

          if (field === "annotation") {
            currentBlock = "annotation";
            if (value) {
              noteLines.push(value);
            }
            return;
          }

          currentBlock = "";
          card[field] = value;
          return;
        }

        if (currentBlock === "body") {
          bodyLines.push(line);
          return;
        }

        if (currentBlock === "annotation") {
          noteLines.push(line);
        }
      });

      card.body = bodyLines.join("\n").trim();
      card.annotation = noteLines.join("\n").trim();
      return card;
    }

    function isRhyme(type) {
      return /童谣|歌谣/.test(type);
    }

    function renderBody(card) {
      if (isRhyme(card.type)) {
        const lines = card.body.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        return `
          <div class="rhyme-block">
            ${lines.map((line) => `<div class="rhyme-line">${line}</div>`).join("")}
          </div>
        `;
      }

      const paragraphs = card.body
        .split(/\n\s*\n/)
        .map((paragraph) => paragraph.replace(/\n/g, "").trim())
        .filter(Boolean);

      return `
        <div class="story-block">
          ${paragraphs.map((paragraph) => `<p>${paragraph}</p>`).join("")}
        </div>
      `;
    }

    function renderAnnotation(annotation) {
      if (!annotation) {
        return "";
      }

      return `
        <section class="annotation">
          <p class="annotation-text">${annotation.replace(/\n/g, "<br>")}</p>
        </section>
      `;
    }

    function renderFooter(card) {
      if (!card.recordedAt && !card.reference) {
        return "";
      }

      return `
        <footer class="footer">
          ${card.recordedAt ? `<span><strong>记录时间</strong> ${card.recordedAt}</span>` : ""}
          ${card.reference ? `<span><strong>档号</strong> ${card.reference}</span>` : ""}
        </footer>
      `;
    }

        function renderCard(card) {
      return `
        <article class="folklore-card-container">
          <div class="parchment-bg" id="parchment"></div>
          
          <div class="parchment-content">
            <header class="header">
              <div class="meta-row">
                ${card.type ? `<span>【${card.type}】</span>` : ""}
                ${card.region ? `<span>[ ${card.region} ]</span>` : ""}
                ${card.circulation ? `<span>[ ${card.circulation} ]</span>` : ""}
              </div>
              <h1 class="title">${card.title}</h1>
              ${card.subtitle ? `<p class="subtitle">${card.subtitle}</p>` : ""}
            </header>

            <main class="content">
              ${renderBody(card)}
              ${renderAnnotation(card.annotation)}
            </main>

            ${renderFooter(card)}
          </div>
        </article>
      `;
    }

    function applyTheme(theme) {
      const nextTheme = theme === "dark" ? "dark" : "light";
      document.body.dataset.theme = nextTheme;
      localStorage.setItem(themeStorageKey, nextTheme);

      const toggle = document.querySelector("[data-theme-toggle]");
      if (toggle) {
        toggle.textContent = nextTheme === "dark" ? uiText.themeNight : uiText.themeDay;
      }
    }

    function bindThemeToggle() {
      document.addEventListener("click", (event) => {
        const toggle = event.target.closest("[data-theme-toggle]");
        if (!toggle) {
          return;
        }

        applyTheme(document.body.dataset.theme === "dark" ? "light" : "dark");
      });
    }

    function init() {
      const card = parseStructuredText(rawFolkloreText);
      document.getElementById("app").innerHTML = renderCard(card);

      const savedTheme = localStorage.getItem(themeStorageKey);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(savedTheme || (prefersDark ? "dark" : "light"));
      console.info("Folklore card rendered.");
    }

    bindThemeToggle();
    init();
  </script>
</body>
</html>
