<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社交媒体帖子卡片</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"MiSans"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      color-scheme: light dark;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .emoji-avatar {
      text-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-8">
    
    <!-- Toolbar with Theme Toggle from Reference -->
    <div class="flex items-center justify-end pb-6">
      <button id="theme-toggle" type="button" data-theme-toggle
        class="text-gray-500 dark:text-gray-400 transition bg-white dark:bg-slate-800 hover:bg-gray-100 dark:hover:bg-slate-700 shadow-sm border border-slate-200 dark:border-slate-700 focus:outline-none rounded-full text-sm p-2.5">
        <svg id="theme-toggle-dark-icon" class="hidden fill-yellow-400 w-6 h-6" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
        <svg id="theme-toggle-light-icon" class="hidden fill-yellow-400 w-6 h-6" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>
        </svg>
      </button>
    </div>

    <!-- Container for Rendered Post -->
    <div id="app"></div>

  </div>

  <script>
    const rawPostText = `
头像: 🍜
昵称: 阿鹤今天吃什么
身份: 城市觅食记录者
口味段位: 咸鲜系·五段
时间: 3 分钟前
正文:
今天在旧巷子里撞见一家只卖两样面的老铺子，门脸小得像会错过的句号。
汤底不浓，却有一种很稳的鲜，像把一天的毛躁都按下去了。
老板说他们凌晨四点开始熬第一锅骨汤，怪不得入口不是刺激的香，而是慢慢展开的暖。
最喜欢的是桌边那罐自制酸豆角，拌进去之后整碗面的层次突然亮起来。
如果你也喜欢安静、扎实、不靠噱头取胜的店，这家真的可以记下来。
配图描述:
木纹旧桌上放着一碗热气微升的清汤面，青瓷碗沿略有岁月痕迹，旁边是一碟细碎酸豆角和一双深色竹筷，午后的窗光斜斜落下。
话题: #巷子小馆, #今日觅食, #清汤面, #值得再来
点赞: 248
收藏: 91
评论数: 3
评论:
- 头像: 林
  昵称: 林知味
  身份: 汤面派
  内容: 这种描述太犯规了，看到“酸豆角拌进去突然亮起来”我已经想出门了。
- 头像: 周
  昵称: 周周有饭
  身份: 朋友局常驻
  内容: 喜欢这种不吵闹的小店推荐，感觉会是一个人也愿意慢慢吃完的地方。
- 头像: 姜
  昵称: 姜小勺
  身份: 咸口拥护者
  内容: 这家如果汤底真像你说的那样干净，我周末要去试试。
`.trim();

    const knownFields = new Map([
      ["头像", "avatar"],
      ["昵称", "nickname"],
      ["身份", "identity"],
      ["口味段位", "tasteRank"],
      ["时间", "timestamp"],
      ["正文", "content"],
      ["配图描述", "imageCaption"],
      ["话题", "hashtags"],
      ["点赞", "likes"],
      ["收藏", "saves"],
      ["评论数", "commentCount"],
      ["评论", "comments"]
    ]);

    function parseComments(lines) {
      const comments = [];
      let current = null;
      lines.forEach((line) => {
        const itemMatch = line.match(/^-\s*头像\s*[:：]\s*(.+)$/);
        if (itemMatch) {
          current = { avatar: itemMatch[1].trim(), nickname: "", identity: "", content: "" };
          comments.push(current);
          return;
        }
        if (!current) return;
        const match = line.match(/^(昵称|身份|内容)\s*[:：]\s*(.+)$/);
        if (!match) {
          if (line.trim()) current.content += (current.content ? " " : "") + line.trim();
          return;
        }
        const fieldMap = { 昵称: "nickname", 身份: "identity", 内容: "content" };
        current[fieldMap[match[1]]] = match[2].trim();
      });
      return comments.slice(0, 3);
    }

    function parseStructuredText(text) {
      const post = {
        avatar: "🙂", nickname: "", identity: "", tasteRank: "", timestamp: "",
        content: "", imageCaption: "", hashtags: [], likes: 0, saves: 0, 
        commentCount: 0, comments: []
      };

      const contentLines = [];
      const commentLines = [];
      let currentBlock = "";

      text.split(/\r?\n/).forEach((rawLine) => {
        const line = rawLine.trim();
        if (!line) {
          if (currentBlock === "content") contentLines.push("");
          return;
        }

        const pairMatch = line.match(/^([^:：-][^:：]*)\s*[:：]\s*(.*)$/);
        const key = pairMatch ? pairMatch[1].trim() : "";
        const field = knownFields.get(key);

        if (pairMatch && field) {
          const value = pairMatch[2].trim();
          if (field === "content") {
            currentBlock = "content";
            if (value) contentLines.push(value);
            return;
          }
          if (field === "comments") {
            currentBlock = "comments";
            if (value) commentLines.push(value);
            return;
          }
          currentBlock = "";
          if (field === "hashtags") {
            post.hashtags = value.split(/[，,、]/).map(i => i.trim()).filter(Boolean);
          } else if (["likes", "saves", "commentCount"].includes(field)) {
            post[field] = Number(value) || 0;
          } else {
            post[field] = value;
          }
          return;
        }
        if (currentBlock === "content") {
          contentLines.push(line);
          return;
        }
        if (currentBlock === "comments") {
          commentLines.push(line.replace(/^\s+/, ""));
        }
      });
      post.content = contentLines.join("\n").trim();
      post.comments = parseComments(commentLines);
      if (!post.commentCount) post.commentCount = post.comments.length;
      return post;
    }

    function renderTags(tags) {
      return tags.map(tag => `
        <span class="inline-block bg-slate-100 dark:bg-slate-700/60 text-slate-600 dark:text-slate-300 rounded-full px-3 py-1 text-sm mr-2 mb-2 font-medium transition hover:bg-slate-200 dark:hover:bg-slate-600 cursor-default">
          ${tag}
        </span>
      `).join("");
    }

    function renderComments(comments) {
      return comments.map(comment => `
        <div class="media flex pb-5">
          <div class="inline-block mr-4 flex-shrink-0">
            <div class="rounded-full w-10 h-10 flex items-center justify-center bg-sky-100 dark:bg-sky-900/40 text-sky-600 dark:text-sky-300 font-bold text-sm border border-sky-200/50 dark:border-sky-800">
              ${comment.avatar.charAt(0)}
            </div>
          </div>
          <div class="media-body flex-1">
            <div class="mb-1 flex items-baseline flex-wrap gap-2">
              <span class="inline-block flex-shrink-0 text-base font-bold text-slate-900 dark:text-white">${comment.nickname}</span>
              <span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-700/50 text-slate-500 dark:text-slate-400 border border-slate-200/50 dark:border-slate-600">${comment.identity}</span>
            </div>
            <p class="text-slate-700 dark:text-slate-200 text-sm leading-relaxed mt-1">${comment.content}</p>
            <div class="mt-2 text-slate-400 text-xs">刚刚回复</div>
          </div>
        </div>
      `).join("");
    }

    function renderPost(post) {
      return `
        <article class="mb-8 p-6 md:p-8 rounded-2xl bg-white dark:bg-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700 flex flex-col transition-all">
          <!-- Author Header -->
          <div class="flex pb-6 items-center justify-between">
            <div class="flex items-center w-full">
              <div class="inline-block mr-4 flex-shrink-0">
                <div class="rounded-full w-14 h-14 text-3xl flex items-center justify-center bg-gradient-to-tr from-rose-50 to-orange-50 dark:from-slate-700 dark:to-slate-600 border border-slate-200 dark:border-slate-600 shadow-sm emoji-avatar">
                  ${post.avatar}
                </div>
              </div>
              <div class="flex flex-col flex-1">
                <div class="flex items-center justify-between">
                  <span class="text-lg font-bold text-slate-900 dark:text-white tracking-wide">${post.nickname}</span>
                  <span class="text-slate-400 dark:text-slate-500 text-sm font-medium">${post.timestamp}</span>
                </div>
                <div class="text-sm text-slate-500 dark:text-slate-400 mt-0.5 font-medium">
                  ${post.identity} <span class="mx-1">•</span> ${post.tasteRank}
                </div>
              </div>
            </div>
          </div>
          
          <!-- Text Body (Text Heavy Design Focus) -->
          <div class="pb-6">
            <p class="text-slate-800 dark:text-slate-100 text-[1.08rem] leading-[1.85] whitespace-pre-line tracking-wide">
              ${post.content}
            </p>
          </div>

          <!-- Semantic Image Placeholder (Heavy on describing text instead of visuals) -->
          ${post.imageCaption ? `
          <div class="pb-6 w-full">
            <div class="relative rounded-xl overflow-hidden bg-slate-50 dark:bg-slate-800/50 border border-slate-200/80 dark:border-slate-700 p-5 md:p-8 flex items-center justify-center">
              <div class="absolute inset-0 bg-gradient-to-br from-black/5 to-transparent dark:from-white/5 pointer-events-none"></div>
              <div class="relative z-10 flex flex-col items-center justify-center text-center max-w-lg mx-auto">
                <svg class="w-8 h-8 text-slate-300 dark:text-slate-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p class="text-slate-500 dark:text-slate-400 text-sm md:text-base italic leading-relaxed">
                  [ 图片描述：${post.imageCaption} ]
                </p>
              </div>
            </div>
          </div>
          ` : ""}

          <!-- Hashtags -->
          ${post.hashtags && post.hashtags.length > 0 ? `
          <div class="flex flex-wrap mb-4">
            ${renderTags(post.hashtags)}
          </div>
          ` : ""}

          <!-- Interaction Stats Bar -->
          <div class="py-4 border-t border-slate-100 dark:border-slate-700 flex items-center gap-6">
            <button class="inline-flex items-center group text-slate-500 hover:text-rose-500 transition focus:outline-none">
              <span class="mr-2">
                <svg class="fill-current w-7 h-7" viewBox="0 0 24 24">
                  <path d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5C2,5.41 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.03L12,21.35Z"></path>
                </svg>
              </span>
              <span class="text-lg font-bold">${post.likes}</span>
            </button>
            <button class="inline-flex items-center group text-slate-500 hover:text-blue-500 transition focus:outline-none">
              <span class="mr-2">
                 <svg class="fill-current w-7 h-7" viewBox="0 0 24 24">
                   <!-- save/bookmark outline -->
                   <path d="M17,3H7A2,2 0 0,0 5,5V21L12,18L19,21V5C19,3.89 18.1,3 17,3M17,18L12,15.82L7,18V5H17V18Z"></path>
                 </svg>
              </span>
              <span class="text-lg font-bold">${post.saves}</span>
            </button>
          </div>

          <!-- Comment Input -->
          <div class="relative mt-2 mb-6 group">
            <input class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-5 py-3.5 placeholder:text-slate-400 dark:placeholder:text-slate-500 font-medium pr-24 text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition" type="text" placeholder="写点评论..." />
            <span class="flex absolute right-4 top-1/2 -translate-y-1/2 items-center">
              <svg class="mr-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition cursor-pointer" style="width: 24px; height: 24px;" viewBox="0 0 24 24">
                <path fill="currentColor" d="M20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12M22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2A10,10 0 0,1 22,12M10,9.5C10,10.3 9.3,11 8.5,11C7.7,11 7,10.3 7,9.5C7,8.7 7.7,8 8.5,8C9.3,8 10,8.7 10,9.5M17,9.5C17,10.3 16.3,11 15.5,11C14.7,11 14,10.3 14,9.5C14,8.7 14.7,8 15.5,8C16.3,8 17,8.7 17,9.5M12,17.23C10.25,17.23 8.71,16.5 7.81,15.42L9.23,14C9.68,14.72 10.75,15.23 12,15.23C13.25,15.23 14.32,14.72 14.77,14L16.19,15.42C15.29,16.5 13.75,17.23 12,17.23Z"></path>
              </svg>
              <svg class="fill-blue-500 hover:fill-blue-600 dark:fill-blue-400 transition cursor-pointer" style="width: 24px; height: 24px;" viewBox="0 0 24 24">
                <path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"></path>
              </svg>
            </span>
          </div>

          <!-- Comments List -->
          ${post.comments.length > 0 ? `
          <div class="pt-2">
            ${renderComments(post.comments)}
            <div class="w-full mt-2">
              <a href="#" class="py-3 px-4 w-full block bg-slate-50 dark:bg-slate-700/30 font-medium text-slate-600 dark:text-slate-400 text-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition ease-in-out">
                查看更多评论 (${post.commentCount})
              </a>
            </div>
          </div>
          ` : ""}
        </article>
      `;
    }

    const themeStorageKey = "social-post-card-theme";
    const themeToggleBtn = document.getElementById("theme-toggle");
    const darkIcon = document.getElementById("theme-toggle-dark-icon");
    const lightIcon = document.getElementById("theme-toggle-light-icon");

    function applyTheme(isDark) {
      if (isDark) {
        document.documentElement.classList.add("dark");
        darkIcon.classList.add("hidden");
        lightIcon.classList.remove("hidden");
        localStorage.setItem(themeStorageKey, "dark");
      } else {
        document.documentElement.classList.remove("dark");
        lightIcon.classList.add("hidden");
        darkIcon.classList.remove("hidden");
        localStorage.setItem(themeStorageKey, "light");
      }
    }

    function init() {
      const post = parseStructuredText(rawPostText);
      document.getElementById("app").innerHTML = renderPost(post);

      const savedTheme = localStorage.getItem(themeStorageKey);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(savedTheme === "dark" || (!savedTheme && prefersDark));

      themeToggleBtn.addEventListener("click", () => {
        applyTheme(!document.documentElement.classList.contains("dark"));
      });
      console.info("Social post card rendered.");
    }

    init();
  </script>
</body>
</html>
