<div class="witch-ui-wrapper">
  <style>
    @import url("https://fontsapi.zeoseven.com/381/main/result.css"); /* 经营总结字体 */
    @import url("https://fontsapi.zeoseven.com/324/main/result.css"); /* 其它内容字体 */

    :root {
      --witch-dark: #150905;    
      /* --witch-purple: #885d9d;  
      --witch-orange: #ff925c;  
      --witch-yellow: #f8e8a1;   */
      --glass-panel: #4c4055;
      --witch-orange: #ef9b59;
      --witch-yellow: #fee785;
      --witch-purple: #885d9d;
      --witch-dark: #1e0411;
      --witch-red: #991F16;
    }

    .witch-ui-wrapper {
      font-family: "NanoWoodHei Mono", sans-serif;
      max-width: min(550px, 100%);
      margin: 20px auto;
      position: relative;
      color: var(--witch-yellow); /* 提高整体易读性 */
      padding: 10px;
    }

    /* 标题字体 */
    .witch-title {
      font-family: "XiangcuiZeroHei-2.0", sans-serif;
      font-size: 1.5em;
      letter-spacing: 3px;
      color: var(--witch-yellow);
      /* text-shadow: 0 0 10px rgba(239, 155, 89, 0.5); */
    }

    /* 主容器 */
    .glass-card {
      background: var(--glass-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid var(--witch-purple);
      border-radius: 24px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.6);
      transition: border-color 0.3s;
    }

    /* 折叠态动效：巫影流光 */
    details:not([open]).glass-card {
      animation: witch-glow 4s infinite alternate;
      cursor: pointer;
    }
    @keyframes witch-glow {
      from { border-color: var(--witch-purple); box-shadow: 0 0 15px rgba(136, 93, 157, 0.3); }
      to { border-color: var(--witch-orange); box-shadow: 0 0 25px rgba(239, 155, 89, 0.4); }
    }

    .witch-header {
      list-style: none;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .witch-header::-webkit-details-marker { display: none; }
    
    .icon-ghost {
      width: 38px;
      height: 38px;
      background: url('https://files.catbox.moe/qanwqa.png') no-repeat center/contain;
      margin-right: 12px;
    }

    /* 动画与折叠逻辑 */
    .anim-box {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    details[open] > .anim-box { grid-template-rows: 1fr; }
    .anim-inner { 
      overflow: hidden; 
      padding: 0 15px;
      margin-top: -20px; /* 补偿padding */
    }

    /* 属性网格 */
    .witch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      padding: 40px 10px 20px; /* 顶部留足空间给气泡 */
    }

    @media (max-width: 360px) {
      .witch-grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }
    }

    .witch-item {
      background: rgba(34, 6, 48, 0.15);
      border: 1px solid rgba(239, 155, 89, 0.4);
      border-radius: 12px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .witch-label {
      font-weight: bold;
      color: var(--witch-orange);
      border-right: 1.5px solid var(--witch-purple);
      padding-right: 10px;
      white-space: nowrap;
    }

    .witch-value { flex: 1; text-align: right; font-weight: bold; }

    /* 进度条统一风格 */
    .witch-progress-box {
      flex: 1.6;
      height: 10px;
      background: var(--witch-dark);
      border: 1px solid var(--witch-orange);
      border-radius: 5px;
      position: relative;
      cursor: help;
      outline: none;
    }
    .witch-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--witch-orange), var(--witch-yellow));
      border-radius: 5px;
      /* box-shadow: 0 0 8px var(--witch-yellow); */
    }

    /* 气泡提示 */
    .bubble-tip {
      position: absolute;
      bottom: calc(100% + 15px);
      right: 0;
      background: var(--witch-yellow);
      color: var(--witch-dark);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      opacity: 0;
      transform: scale(0.8) translateY(10px);
      transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      white-space: nowrap;
      z-index: 100;
    }
    .bubble-tip::after {
      content: '';
      position: absolute;
      bottom: -6px;
      right: 10px;
      border-top: 6px solid var(--witch-yellow);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
    }
    .witch-progress-box:focus .bubble-tip { opacity: 1; transform: scale(1) translateY(0); }

    /* 子折叠区域 */
    .sub-section { border-top: 1px solid rgba(136, 93, 157, 0.3); margin-top: 10px; }
    .sub-summary {
      list-style: none;
      cursor: pointer;
      color: var(--witch-orange);
      padding: 15px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }
    .sub-summary::before {
      content: '';
      width: 20px; height: 20px;
      background: url('https://files.catbox.moe/nl39g8.png') no-repeat center/contain;
      transition: transform 0.3s;
    }
    details[open] > .sub-summary::before { transform: rotate(45deg); }

    /* 定制提醒：外置标签 */
    .remind-tag-outer {
      margin: 35px 10px 10px;
      position: relative;
    }
    .remind-label {
      position: absolute;
      top: -14px; left: 25px;
      background: var(--witch-orange);
      color: var(--witch-dark);
      padding: 2px 15px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.9em;
      z-index: 10;
      box-shadow: 3px 3px 0 var(--witch-purple);
    }
    .remind-content {
      background: rgba(136, 93, 157, 0.1);
      border: 1.5px solid var(--witch-orange);
      border-radius: 15px;
      padding: 25px 20px 15px;
      line-height: 1.8;
      color: var(--witch-yellow);
    }

    /* 右下角大装饰 */
    .witch-banner {
      position: absolute;
      right: -25px; bottom: -35px;
      width: 170px;
      z-index: 200;
      /* filter: drop-shadow(0 0 15px rgba(239, 155, 89, 0.4)); */
      pointer-events: none;
    }
  </style>

  <chef_status_bar>
    <!-- 主卡片：默认折叠 -->
    <details class="glass-card">
      <summary class="witch-header">
        <div class="icon-ghost"></div>
        <span class="witch-title">经营总结</span>
      </summary>

      <div class="anim-box">
        <div class="anim-inner">
          <!-- 核心层 -->
          <div class="witch-grid">
            <div class="witch-item"><span class="witch-label">姓名</span><span class="witch-value">{{user}}</span></div>
            <div class="witch-item">
              <span class="witch-label">声望</span>
              <div class="witch-progress-box" tabindex="0">
                <div class="witch-progress-fill" style="width: 40%"></div>
                <div class="bubble-tip">声望: 40/100</div>
              </div>
            </div>
            <div class="witch-item"><span class="witch-label">状态</span><span class="witch-value">充满干劲 🌙</span></div>
            <div class="witch-item"><span class="witch-label">存款</span><span class="witch-value" style="color:var(--witch-orange)">$5000</span></div>
          </div>

          <!-- 店铺详情：默认折叠 -->
          <details class="sub-section">
            <summary class="sub-summary">店铺经营详情</summary>
            <div class="anim-box">
              <div class="anim-inner">
                <div class="witch-grid">
                  <div class="witch-item"><span class="witch-label">等级</span><span class="witch-value">无名小店</span></div>
                  <div class="witch-item">
                    <span class="witch-label">人气</span>
                    <div class="witch-progress-box" tabindex="0">
                      <div class="witch-progress-fill" style="width: 50%"></div>
                      <div class="bubble-tip">人气: 50/100</div>
                    </div>
                  </div>
                  <div class="witch-item">
                    <span class="witch-label">库存</span>
                    <div class="witch-progress-box" tabindex="0">
                      <div class="witch-progress-fill" style="width: 85%"></div>
                      <div class="bubble-tip">库存: 85/100</div>
                    </div>
                  </div>
                  <div class="witch-item">
                    <span class="witch-label">整洁</span>
                    <div class="witch-progress-box" tabindex="0">
                      <div class="witch-progress-fill" style="width: 95%"></div>
                      <div class="bubble-tip">整洁: 95/100</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </details>

          <!-- 三餐评估：默认折叠 -->
          <details class="sub-section">
            <summary class="sub-summary">三餐营业评估</summary>
            <div class="anim-box">
              <div class="anim-inner">
                <div class="witch-grid">
                  <div class="witch-item"><span class="witch-label">早市</span><span class="witch-value">待评估</span></div>
                  <div class="witch-item"><span class="witch-label">午市</span><span class="witch-value">待评估</span></div>
                  <div class="witch-item"><span class="witch-label">晚市</span><span class="witch-value">待评估</span></div>
                  <div class="witch-item"><span class="witch-label">总结</span><span class="witch-value">待评估</span></div>
                </div>
              </div>
            </div>
          </details>

          <!-- 定制提醒 -->
          <div class="remind-tag-outer">
            <div class="remind-label">定制提醒</div>
            <div class="remind-content">
              K女士需要一份精致早餐<br>
              C女士需要十个新鲜法棍
            </div>
          </div>
          <div style="height: 20px;"></div>
        </div>
      </div>
    </details>

    <!-- 右下角氛围横幅 -->
    <img src="https://files.catbox.moe/73nawz.png" class="witch-banner" alt="witch craft">
  </chef_status_bar>
</div>
